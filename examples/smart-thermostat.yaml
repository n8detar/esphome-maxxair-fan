substitutions:
  name: maxxair-fan
  friendly_name: MaxxAir Fan
  ir_pin: GPIO4

external_components:
  - source: github://n8detar/esphome-maxxair-fan@main
    components:
      - maxxair_fan
      - maxxfan_protocol

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  devices:
    - id: maxxair_fan_device
      name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

remote_transmitter:
  id: ir_transmitter
  pin:
    number: ${ir_pin}
    inverted: false
  carrier_duty_percent: 50%
  non_blocking: true

sensor:
  # Replace this with your actual cabin temperature sensor.
  - platform: template
    id: cabin_temperature
    name: Cabin Temperature
    device_class: temperature
    unit_of_measurement: "°F"
    accuracy_decimals: 1
    lambda: return NAN;
    update_interval: 60s

maxxair_fan:
  id: roof_fan
  transmitter_id: ir_transmitter
  temperature_sensor_id: cabin_temperature
  auto_temperature: 78
  fan:
    name: Fan
    device_id: maxxair_fan_device
  cover:
    name: Lid
    device_id: maxxair_fan_device
  ceiling_fan:
    name: Ceiling Fan Mode
    device_id: maxxair_fan_device
  mode:
    name: Control Mode
    device_id: maxxair_fan_device
  low_temperature:
    name: Smart Low Temperature
    device_id: maxxair_fan_device
  high_temperature:
    name: Smart High Temperature
    device_id: maxxair_fan_device
  min_speed:
    name: Smart Minimum Speed
    device_id: maxxair_fan_device
  max_speed:
    name: Smart Maximum Speed
    device_id: maxxair_fan_device
  auto_setpoint:
    name: Fan Thermostat Setpoint
    device_id: maxxair_fan_device
  open_button:
    name: Open Lid
    device_id: maxxair_fan_device
  close_button:
    name: Close Lid
    device_id: maxxair_fan_device
