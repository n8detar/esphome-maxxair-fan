substitutions:
  name: maxxair-fan
  friendly_name: MaxxAir Fan
  ir_pin: GPIO4

external_components:
  - source: github://n8detar/esphome-maxxair-fan@main
    components:
      - maxxair_fan
      - maxxfan_protocol

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  devices:
    - id: maxxair_fan_device
      name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

remote_transmitter:
  id: ir_transmitter
  pin:
    number: ${ir_pin}
    inverted: false
  carrier_duty_percent: 50%
  non_blocking: true

maxxair_fan:
  id: roof_fan
  transmitter_id: ir_transmitter
  auto_temperature: 78
  fan:
    name: Fan
    device_id: maxxair_fan_device
  cover:
    name: Lid
    device_id: maxxair_fan_device
  ceiling_fan:
    name: Ceiling Fan Mode
    device_id: maxxair_fan_device
  auto_mode:
    name: Auto Mode
    device_id: maxxair_fan_device
  open_button:
    name: Open Lid
    device_id: maxxair_fan_device
  close_button:
    name: Close Lid
    device_id: maxxair_fan_device
