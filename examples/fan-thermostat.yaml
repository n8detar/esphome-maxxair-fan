substitutions:
  name: maxxair-fan
  friendly_name: MaxxAir Fan
  ir_pin: GPIO4

external_components:
  - source: github://n8detar/esphome-maxxair-fan@main
    components:
      - maxxair_fan
      - maxxfan_protocol

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

remote_transmitter:
  id: ir_tx
  pin:
    number: ${ir_pin}
    inverted: false
  carrier_duty_percent: 50%
  non_blocking: true

maxxair_fan:
  id: roof_fan
  transmitter_id: ir_tx
  auto_temperature: 78
  fan:
    name: Fan
  cover:
    name: Lid
  mode:
    name: Control Mode
    restore_value: true
  auto_setpoint:
    name: Fan Thermostat Setpoint
    initial_value: 78
    restore_value: true
